<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>رفيع أم غليظ؟</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#c8e6f5;
  font-family:'Tajawal',sans-serif;
  overflow:hidden;
  touch-action:manipulation;
}

/* ── WRAPPER ── */
.game-wrap{
  position:relative;
  width:min(980px,100vw);
  aspect-ratio:16/9;
  user-select:none;
}

.notebook-bg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:fill;
  border-radius:16px;
}

/* ── LAYOUT ── */
.game-layout{
  position:absolute;inset:0;
  display:flex;flex-direction:row;
  align-items:stretch;
  padding:6% 2% 5% 2%;
  gap:1.5%;
}

/* ── STARS PANEL ── */
.stars-panel{
  width:10%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.stars-label{
  font-size:clamp(8px,1.3vw,15px);
  font-weight:900;color:#7a4e00;
  margin-bottom:4px;
}
.stars-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
}
.star-img{
  width:clamp(16px,2.8vw,30px);
  height:clamp(16px,2.8vw,30px);
  object-fit:contain;
  background:none;
  transition:transform .3s;
}
.star-img.pop{animation:starPop .45s ease;}
@keyframes starPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.7) rotate(25deg)}
  100%{transform:scale(1)}
}

/* ── CENTER PANEL ── */
.center-panel{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:0 1%;
}

.instruction{
  font-size:clamp(9px,1.3vw,15px);
  font-weight:700;color:#4a3500;
  background:rgba(255,255,255,.65);
  border-radius:20px;
  padding:3px 14px;
  text-align:center;
}

/* ── MAIN CARD ── */
.main-card-wrap{
  position:relative;
  width:54%;
  aspect-ratio:4/3;
  border-radius:14px;
  overflow:hidden;
  border:3px solid #e8a020;
  box-shadow:0 6px 20px rgba(0,0,0,.2);
  cursor:pointer;
  background:#f5f0e0;
}
.main-card-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  background:#f5f0e0;
}

.play-btn{
  position:absolute;
  bottom:8px;left:50%;
  transform:translateX(-50%);
  width:clamp(30px,4.5vw,50px);
  height:clamp(30px,4.5vw,50px);
  background:#e74c3c;
  border-radius:50%;
  border:3px solid white;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(231,76,60,.55);
  font-size:clamp(11px,1.6vw,18px);
  color:white;
  padding-right:0;padding-left:3px;
  transition:all .15s;
  touch-action:manipulation;
  z-index:2;
}
.play-btn:hover{transform:translateX(-50%) scale(1.1);}
.play-btn:active{transform:translateX(-50%) scale(.9);}
.play-btn.playing{
  background:#27ae60;
  animation:btnPulse .6s infinite alternate;
}
@keyframes btnPulse{to{box-shadow:0 0 16px rgba(39,174,96,.8);}}

/* ── CLASSIFY BUTTONS ── */
.classify-btns{
  display:flex;gap:clamp(8px,1.5vw,20px);
  width:90%;justify-content:center;
  align-items:center;
}
.classify-btn-img{
  height:clamp(34px,5.5vw,62px);
  width:auto;
  cursor:pointer;
  transition:transform .12s,filter .12s;
  touch-action:manipulation;
}
.classify-btn-img:hover{transform:scale(1.07);}
.classify-btn-img:active{transform:scale(.93);}
.classify-btn-img.disabled{
  opacity:.4;
  pointer-events:none;
  cursor:not-allowed;
}

/* تم button */
.done-btn-wrap{
  display:none;
  justify-content:center;
  width:100%;
  margin-top:4px;
}
.done-btn-wrap.visible{display:flex;}
.done-btn-img{
  height:clamp(30px,4.8vw,54px);
  cursor:pointer;
  transition:transform .12s;
  touch-action:manipulation;
}
.done-btn-img:hover{transform:scale(1.08);}
.done-btn-img:active{transform:scale(.93);}

/* ── THUMBS PANEL ── */
.thumbs-panel{
  width:35%;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(5, 1fr);
  gap:4px;
  align-items:stretch;
  justify-items:stretch;
  padding:4px;
  overflow:hidden;
}

.thumb-card{
  position:relative;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid #e8a020;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
  transition:opacity .25s, box-shadow .18s, border-color .18s;
  touch-action:manipulation;
  background:#f5f0e0;
  min-height:0;
}
.thumb-card img.thumb-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  background:#f5f0e0;
}
.thumb-card:not(.selected):not(.answered){
  opacity:.4;
}
.thumb-card.selected{
  opacity:1;
  border-color:#4a90d9;
  box-shadow:0 0 0 2px rgba(74,144,217,.5);
}
.thumb-card.correct{
  opacity:1;
  border-color:#27ae60;
}
.thumb-card.wrong{
  opacity:.7;
  border-color:#e74c3c;
}
.thumb-card.answered{cursor:default;}
.thumb-card:hover:not(.answered):not(.selected){
  opacity:.75;
}

.thumb-play{
  position:absolute;
  bottom:4px;right:4px;
  width:clamp(14px,2vw,24px);
  height:clamp(14px,2vw,24px);
  background:#e74c3c;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(6px,.9vw,10px);
  color:white;
  padding-left:1px;
  cursor:pointer;
  box-shadow:0 2px 4px rgba(0,0,0,.3);
  transition:transform .12s;
  z-index:3;
  touch-action:manipulation;
}
.thumb-play:hover{transform:scale(1.2);}

.thumb-badge{
  position:absolute;top:3px;left:3px;
  font-size:clamp(8px,1.1vw,13px);
  line-height:1;
  z-index:3;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));
}

/* ── FEEDBACK OVERLAY ── */
.feedback-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  z-index:60;
  background:rgba(0,0,0,0);
  transition:background .25s;
}
.feedback-overlay.active{
  pointer-events:all;
  background:rgba(0,0,0,.35);
}
.feedback-img{
  display:none;
  max-width:50%;
  max-height:60%;
  object-fit:contain;
  animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.35));
}
.feedback-img.visible{display:block;}
@keyframes popIn{
  from{transform:scale(.3);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* reveal label after 2nd wrong */
.reveal-label{
  display:none;
  position:absolute;
  bottom:22%;left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.95);
  border-radius:12px;
  padding:6px 18px;
  font-size:clamp(11px,1.6vw,18px);
  font-weight:900;
  color:#333;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
  white-space:nowrap;
  z-index:70;
  animation:slideUp .3s ease;
}
.reveal-label.visible{display:block;}
@keyframes slideUp{
  from{transform:translateX(-50%) translateY(10px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}

/* ── END SCREEN ── */
.end-screen{
  position:absolute;inset:0;
  background:rgba(255,251,235,.97);
  border-radius:16px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(8px,1.8vh,18px);
  z-index:100;
}
.end-screen.visible{display:flex;}
.end-title{
  font-size:clamp(18px,3.8vw,44px);
  font-weight:900;color:#e8841a;
  text-align:center;
}
.end-stars-row{
  display:flex;flex-wrap:wrap;
  justify-content:center;
  gap:clamp(3px,.8vw,8px);
  max-width:70%;
}
.end-star{
  opacity:0;
  width:clamp(20px,3vw,34px);
  height:clamp(20px,3vw,34px);
  object-fit:contain;
  animation:starReveal .35s forwards;
  background:none;
}
@keyframes starReveal{
  from{opacity:0;transform:scale(0) rotate(-30deg)}
  to{opacity:1;transform:scale(1)}
}
.end-score{
  font-size:clamp(13px,2.2vw,26px);
  font-weight:700;color:#333;
}
.end-msg{
  font-size:clamp(11px,1.6vw,20px);
  color:#666;
}
.end-done-img{
  height:clamp(32px,5.5vw,62px);
  cursor:pointer;
  transition:transform .12s;
  touch-action:manipulation;
}
.end-done-img:hover{transform:scale(1.08);}
.end-done-img:active{transform:scale(.93);}
</style>
</head>

  { key:'wind',     name:'هواء',       img:'images/wind.png',    audio:'audio/Wind blowing.mp3',    answer:'ghaleez', pitchType:'noise'  },
  { key:'lion',     name:'أسد',        img:'images/lion.png',    audio:'audio/Lion roar.mp3',       answer:'ghaleez', pitchType:'roar'   },
  { key:'boy',      name:'طفل',        img:'images/boy.png',     audio:'audio/Children.mp3',        answer:'rafee',   pitchType:'high'   },
  { key:'cat',      name:'قطة',        img:'images/cat.png',     audio:'audio/Cat meow.mp3',        answer:'rafee',   pitchType:'meow'   },
  { key:'bird',     name:'عصفور',      img:'images/bird.png',    audio:'audio/Bird Chirping.mp3',   answer:'rafee',   pitchType:'tweet'  },
  { key:'frog',     name:'ضفدع',       img:'images/frog.png',    audio:'audio/Frog Croak.mp3',      answer:'ghaleez', pitchType:'croak'  },
  { key:'cello',    name:'كمان',       img:'images/cello.png',   audio:'audio/cello.mp3',           answer:'rafee',   pitchType:'string' }
];

// ── STATE ────────────────────────────────────────────────────────────────────
let currentIdx = 0;
let attempts   = 0;
let score      = 0;
let results    = new Array(10).fill(null); // null | 'correct' | 'wrong'
let answered   = new Set();
let audioCtx   = null;
let activeOscs = [];

const STAR_ACTIVE   = 'images/active_star.png';
const STAR_INACTIVE = 'images/inactive_star.png';

// ── WEB AUDIO SYNTH ──────────────────────────────────────────────────────────
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function stopAll(){
  activeOscs.forEach(n=>{ try{n.stop();}catch(e){} });
  activeOscs=[];
}

function playNote(freq,type,startT,dur,gainVal,ctx){
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(gainVal,startT);
  g.gain.exponentialRampToValueAtTime(0.001,startT+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(startT); o.stop(startT+dur);
  activeOscs.push(o);
}

function playNoise(startT,dur,gainVal,ctx,lowpass){
  const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=ctx.createBufferSource();
  src.buffer=buf;
  const filt=ctx.createBiquadFilter();
  filt.type='lowpass';filt.frequency.value=lowpass||400;
  const g=ctx.createGain();
  g.gain.setValueAtTime(gainVal,startT);
  g.gain.exponentialRampToValueAtTime(0.001,startT+dur);
  src.connect(filt); filt.connect(g); g.connect(ctx.destination);
  src.start(startT); src.stop(startT+dur);
  activeOscs.push(src);
}

function synthSound(pitchType){
  stopAll();
  const ctx=getCtx();
  const now=ctx.currentTime;
  switch(pitchType){
    case 'low':  // deep man voice hum
      playNote(130,'sine',now,.8,.3,ctx);
      playNote(260,'sine',now,.8,.1,ctx);
      playNote(80,'sine',now+.8,.6,.25,ctx);
      playNote(160,'sine',now+.8,.6,.08,ctx);
      break;
    case 'rumble': // airplane engine
      playNoise(now,1.4,.35,ctx,200);
      playNote(80,'sawtooth',now,1.4,.15,ctx);
      playNote(120,'sawtooth',now+.4,.6,.1,ctx);
      break;
    case 'boom': // thunder
      playNoise(now,.15,.6,ctx,800);
      playNoise(now+.12,.9,.4,ctx,250);
      playNote(60,'sine',now+.1,.8,.2,ctx);
      break;
    case 'noise': // wind
      playNoise(now,1.5,.2,ctx,350);
      playNoise(now+.5,.8,.15,ctx,500);
      break;
    case 'roar': // lion
      playNote(150,'sawtooth',now,.15,.4,ctx);
      playNote(100,'sawtooth',now+.12,.5,.35,ctx);
      playNote(80,'sawtooth',now+.5,.6,.3,ctx);
      playNoise(now,.7,.2,ctx,300);
      break;
    case 'high': // child voice
      playNote(600,'sine',now,.4,.25,ctx);
      playNote(700,'sine',now+.4,.3,.2,ctx);
      playNote(550,'sine',now+.7,.4,.22,ctx);
      break;
    case 'meow': // cat
      const meowFreqs=[800,900,750,850];
      meowFreqs.forEach((f,i)=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(f,now+i*.22);
        o.frequency.linearRampToValueAtTime(f*1.2,now+i*.22+.18);
        o.frequency.linearRampToValueAtTime(f*.85,now+i*.22+.3);
        g.gain.setValueAtTime(.25,now+i*.22);
        g.gain.exponentialRampToValueAtTime(0.001,now+i*.22+.32);
        o.connect(g); g.connect(ctx.destination);
        o.start(now+i*.22); o.stop(now+i*.22+.34);
        activeOscs.push(o);
      });
      break;
    case 'tweet': // bird
      [1200,1400,1100,1300,1500].forEach((f,i)=>{
        playNote(f,'sine',now+i*.18,.16,.18,ctx);
        playNote(f*1.5,'sine',now+i*.18+.08,.1,.08,ctx);
      });
      break;
    case 'croak': // frog - deep bullfrog croak
      [90,100,85].forEach((f,i)=>{
        playNote(f,'square',now+i*.35,.35,.35,ctx);
        playNote(f*.5,'sawtooth',now+i*.35,.35,.2,ctx);
      });
      break;
    case 'string': // cello/violin
      const celFreqs=[660,660*1.5,660*2];
      celFreqs.forEach((f,i)=>{
        playNote(f,'sawtooth',now,.9,.15*(1-i*.05),ctx);
      });
      playNote(660,'sawtooth',now+.9,.7,.15,ctx);
      break;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderStars(){
  const grid=document.getElementById('starsGrid');
  grid.innerHTML='';
  SOUNDS.forEach((_,i)=>{
    const img=document.createElement('img');
    img.className='star-img'+(results[i]==='correct'?' pop':'');
    img.src=results[i]==='correct'?STAR_ACTIVE:STAR_INACTIVE;
    img.id='star-'+i;
    grid.appendChild(img);
  });
}

function renderThumbs(){
  const panel=document.getElementById('thumbsPanel');
  panel.innerHTML='';
  SOUNDS.forEach((s,i)=>{
    const card=document.createElement('div');
    let cls='thumb-card';
    if(i===currentIdx) cls+=' selected';
    else if(results[i]==='correct') cls+=' correct answered';
    else if(results[i]==='wrong')   cls+=' wrong answered';
    else if(answered.has(i))        cls+=' answered';
    card.className=cls;

    const img=document.createElement('img');
    img.className='thumb-img';
    img.src=s.img; img.alt=s.name;
    card.appendChild(img);

    const badge=document.createElement('div');
    badge.className='thumb-badge';
    badge.textContent=results[i]==='correct'?'✅':results[i]==='wrong'?'❌':'';
    card.appendChild(badge);

    const playBtn=document.createElement('div');
    playBtn.className='thumb-play';
    playBtn.innerHTML='▶';
    playBtn.addEventListener('click',(e)=>{
      e.stopPropagation();
      selectSound(i);
      playCurrentAudio();
    });
    card.appendChild(playBtn);

    card.addEventListener('click',()=>{ if(!answered.has(i)||i===currentIdx) selectSound(i); });
    panel.appendChild(card);
  });
}

function renderMain(){
  document.getElementById('mainCardImg').src=SOUNDS[currentIdx].img;
}

function checkDoneBtn(){
  if(answered.size>=SOUNDS.length){
    document.getElementById('doneBtnWrap').classList.add('visible');
  }
}

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function selectSound(idx){
  if(answered.has(idx) && idx!==currentIdx) return;
  currentIdx=idx;
  attempts=0;
  renderMain();
  renderThumbs();
  setButtonsDisabled(false);
}

// Global audio element for playing sound files
let currentAudioElement = null;

function playCurrentAudio(){
  stopAll();
  // Stop any playing audio element
  if(currentAudioElement){
    currentAudioElement.pause();
    currentAudioElement.currentTime = 0;
  }
  
  const s=SOUNDS[currentIdx];
  const btn=document.getElementById('mainPlayBtn');
  btn.classList.add('playing');
  
  // Try to play audio file if it exists
  if(s.audio){
    currentAudioElement = new Audio(s.audio);
    currentAudioElement.onended = ()=>btn.classList.remove('playing');
    currentAudioElement.onerror = ()=>{
      // Fall back to synthesized sound if audio file fails
      synthSound(s.pitchType);
      setTimeout(()=>btn.classList.remove('playing'),1200);
    };
    currentAudioElement.play().catch(()=>{
      // Fall back to synthesized sound on play error
      synthSound(s.pitchType);
      setTimeout(()=>btn.classList.remove('playing'),1200);
    });
  } else {
    // No audio file, use synthesized sound
    setTimeout(()=>btn.classList.remove('playing'),1200);
    synthSound(s.pitchType);
  }
}

function classify(choice){
  if(answered.has(currentIdx)) return;
  setButtonsDisabled(true);
  const s=SOUNDS[currentIdx];
  const correct=choice===s.answer;

  if(correct){
    answered.add(currentIdx);
    results[currentIdx]='correct';
    score++;
    showFeedback('correct');
    renderStars();
    setTimeout(()=>{
      hideFeedback();
      renderThumbs();
      checkDoneBtn();
      advanceNext();
    },1800);
  } else {
    attempts++;
    if(attempts>=2){
      answered.add(currentIdx);
      results[currentIdx]='wrong';
      const lbl=s.answer==='rafee'?'الإجابة: رفيع 🐦':'الإجابة: غليظ 🦁';
      showFeedback('wrong', lbl);
      renderStars();
      setTimeout(()=>{
        hideFeedback();
        renderThumbs();
        checkDoneBtn();
        advanceNext();
      },2600);
    } else {
      showFeedback('wrong');
      setTimeout(()=>{
        hideFeedback();
        setButtonsDisabled(false);
      },1600);
    }
  }
}

function advanceNext(){
  if(answered.size>=SOUNDS.length){ return; }
  // find next unanswered after current
  for(let i=currentIdx+1;i<SOUNDS.length;i++){
    if(!answered.has(i)){selectSound(i);return;}
  }
  for(let i=0;i<currentIdx;i++){
    if(!answered.has(i)){selectSound(i);return;}
  }
}

function setButtonsDisabled(dis){
  const r=document.getElementById('btnRafee');
  const g=document.getElementById('btnGhaleez');
  if(dis){r.classList.add('disabled');g.classList.add('disabled');}
  else{r.classList.remove('disabled');g.classList.remove('disabled');}
}

// ── FEEDBACK ──────────────────────────────────────────────────────────────────
function showFeedback(type, revealText){
  const overlay=document.getElementById('feedbackOverlay');
  overlay.classList.add('active');
  if(type==='correct'){
    document.getElementById('fbCorrect').classList.add('visible');
  } else {
    document.getElementById('fbWrong').classList.add('visible');
    if(revealText){
      const lbl=document.getElementById('revealLabel');
      lbl.textContent=revealText;
      lbl.classList.add('visible');
    }
  }
}

function hideFeedback(){
  const overlay=document.getElementById('feedbackOverlay');
  overlay.classList.remove('active');
  document.getElementById('fbCorrect').classList.remove('visible');
  document.getElementById('fbWrong').classList.remove('visible');
  document.getElementById('revealLabel').classList.remove('visible');
}

// ── END SCREEN ────────────────────────────────────────────────────────────────
function showEndScreen(){
  const end=document.getElementById('endScreen');
  end.className='end-screen visible';

  const row=document.getElementById('endStarsRow');
  row.innerHTML='';
  results.forEach((r,i)=>{
    const img=document.createElement('img');
    img.className='end-star';
    img.src=r==='correct'?STAR_ACTIVE:STAR_INACTIVE;
    img.style.animationDelay=(i*.13)+'s';
    row.appendChild(img);
  });

  document.getElementById('endScore').textContent=score+' / 10 إجابات صحيحة';
  const msgs=['ممتاز جداً! 🏆','جيد جداً! 🌟','جيد! 👍','استمر في التدريب 💪'];
  const lvl=score>=9?0:score>=7?1:score>=5?2:3;
  document.getElementById('endMsg').textContent=msgs[lvl];
  document.getElementById('endTitle').textContent=score>=7?'🎉 أحسنت يا بطل! 🎉':'💪 حاول مرة أخرى!';
}

function restartGame(){
  currentIdx=0;attempts=0;score=0;
  results=new Array(10).fill(null);
  answered=new Set();
  stopAll();
  document.getElementById('endScreen').className='end-screen';
  document.getElementById('doneBtnWrap').classList.remove('visible');
  setButtonsDisabled(false);
  selectSound(0);
  renderStars();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
selectSound(0);
renderStars();
</script>
